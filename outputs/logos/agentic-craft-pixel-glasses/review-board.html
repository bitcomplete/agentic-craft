<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agentic Craft pixel glasses logo exploration</title>
<style>
body { margin: 0; font-family: Arial, sans-serif; background: #fff; color: #181818; }
main { padding: 24px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; align-items: start; }
figure { margin: 0; }
img { width: 100%; height: auto; display: block; border: 1px solid #e5e5e5; border-radius: 8px; background: #fafafa; }
figcaption { margin-top: 8px; font-size: 13px; line-height: 1.3; color: #333; }
.prompt-card { border: 1px solid #e5e5e5; border-radius: 8px; padding: 14px; background: #fafafa; }
.prompt-card figcaption { margin-top: 0; font-weight: 700; }
.prompt-card figcaption span { display: inline-block; margin-left: 6px; color: #7a4b16; font-weight: 600; }
.prompt-card p { margin: 10px 0 0; font-size: 12px; line-height: 1.45; color: #555; }
.empty-state { border: 1px solid #e5e5e5; border-radius: 8px; padding: 18px; color: #555; background: #fafafa; }

.tile-controls { display: flex; gap: 6px; margin-top: 7px; opacity: .86; }
.tile-controls button, .tile-controls a { border: 1px solid #dfdfdf; border-radius: 7px; background: #fff; color: #333; cursor: pointer; font: inherit; font-size: 11px; font-weight: 650; line-height: 1; padding: 6px 8px; text-decoration: none; }
.tile-controls button:hover, .tile-controls a:hover { background: #f6f6f6; }
figure.selected img { outline: 3px solid #181818; outline-offset: 2px; }
figure.hidden { display: none; }
.image-viewer { border: 0; border-radius: 10px; padding: 0; max-width: min(94vw, 1400px); background: transparent; }
.image-viewer::backdrop { background: rgba(0, 0, 0, .72); }
.image-viewer-inner { display: grid; gap: 8px; padding: 10px; background: #fff; border-radius: 10px; }
.image-viewer img { max-width: 90vw; max-height: 84vh; width: auto; border: 0; border-radius: 8px; }
.viewer-close { justify-self: end; border: 1px solid #ddd; background: #fff; border-radius: 999px; cursor: pointer; padding: 6px 10px; }

</style>
</head>
<body><main><div class="grid"><figure data-card-id="favicon-32-grid"><a class="image-link" href="01-favicon-32-grid.png"><img src="01-favicon-32-grid.png" alt="32px Favicon Grid"></a><div class="tile-controls"><button class="select-card" type="button" aria-pressed="false">Select</button><a class="download-card" href="01-favicon-32-grid.png" download="01-favicon-32-grid.png">Download</a><button class="remove-card" type="button" aria-label="Remove 32px Favicon Grid">Remove</button></div><figcaption>01. 32px Favicon Grid</figcaption></figure><figure data-card-id="ink-stamp-rim"><a class="image-link" href="02-ink-stamp-rim.png"><img src="02-ink-stamp-rim.png" alt="Ink Stamp Rim"></a><div class="tile-controls"><button class="select-card" type="button" aria-pressed="false">Select</button><a class="download-card" href="02-ink-stamp-rim.png" download="02-ink-stamp-rim.png">Download</a><button class="remove-card" type="button" aria-label="Remove Ink Stamp Rim">Remove</button></div><figcaption>02. Ink Stamp Rim</figcaption></figure><figure data-card-id="flat-agent-shades"><a class="image-link" href="03-flat-agent-shades.png"><img src="03-flat-agent-shades.png" alt="Flat Agent Shades"></a><div class="tile-controls"><button class="select-card" type="button" aria-pressed="false">Select</button><a class="download-card" href="03-flat-agent-shades.png" download="03-flat-agent-shades.png">Download</a><button class="remove-card" type="button" aria-label="Remove Flat Agent Shades">Remove</button></div><figcaption>03. Flat Agent Shades</figcaption></figure><figure data-card-id="terminal-mask"><a class="image-link" href="04-terminal-mask.png"><img src="04-terminal-mask.png" alt="Terminal Mask"></a><div class="tile-controls"><button class="select-card" type="button" aria-pressed="false">Select</button><a class="download-card" href="04-terminal-mask.png" download="04-terminal-mask.png">Download</a><button class="remove-card" type="button" aria-label="Remove Terminal Mask">Remove</button></div><figcaption>04. Terminal Mask</figcaption></figure><figure data-card-id="negative-bridge"><a class="image-link" href="05-negative-bridge.png"><img src="05-negative-bridge.png" alt="Negative Bridge"></a><div class="tile-controls"><button class="select-card" type="button" aria-pressed="false">Select</button><a class="download-card" href="05-negative-bridge.png" download="05-negative-bridge.png">Download</a><button class="remove-card" type="button" aria-label="Remove Negative Bridge">Remove</button></div><figcaption>05. Negative Bridge</figcaption></figure><figure data-card-id="proof-disc"><a class="image-link" href="06-proof-disc.png"><img src="06-proof-disc.png" alt="Proof Disc"></a><div class="tile-controls"><button class="select-card" type="button" aria-pressed="false">Select</button><a class="download-card" href="06-proof-disc.png" download="06-proof-disc.png">Download</a><button class="remove-card" type="button" aria-label="Remove Proof Disc">Remove</button></div><figcaption>06. Proof Disc</figcaption></figure><figure data-card-id="proof-corner-brackets"><a class="image-link" href="07-proof-corner-brackets.png"><img src="07-proof-corner-brackets.png" alt="Proof Corner Brackets"></a><div class="tile-controls"><button class="select-card" type="button" aria-pressed="false">Select</button><a class="download-card" href="07-proof-corner-brackets.png" download="07-proof-corner-brackets.png">Download</a><button class="remove-card" type="button" aria-label="Remove Proof Corner Brackets">Remove</button></div><figcaption>07. Proof Corner Brackets</figcaption></figure><figure data-card-id="terminal-viewport"><a class="image-link" href="08-terminal-viewport.png"><img src="08-terminal-viewport.png" alt="Terminal Viewport"></a><div class="tile-controls"><button class="select-card" type="button" aria-pressed="false">Select</button><a class="download-card" href="08-terminal-viewport.png" download="08-terminal-viewport.png">Download</a><button class="remove-card" type="button" aria-label="Remove Terminal Viewport">Remove</button></div><figcaption>08. Terminal Viewport</figcaption></figure><figure data-card-id="standalone-shades"><a class="image-link" href="09-standalone-shades.png"><img src="09-standalone-shades.png" alt="Standalone Shades"></a><div class="tile-controls"><button class="select-card" type="button" aria-pressed="false">Select</button><a class="download-card" href="09-standalone-shades.png" download="09-standalone-shades.png">Download</a><button class="remove-card" type="button" aria-label="Remove Standalone Shades">Remove</button></div><figcaption>09. Standalone Shades</figcaption></figure><figure data-card-id="rim-fragments"><a class="image-link" href="10-rim-fragments.png"><img src="10-rim-fragments.png" alt="Rim Fragments"></a><div class="tile-controls"><button class="select-card" type="button" aria-pressed="false">Select</button><a class="download-card" href="10-rim-fragments.png" download="10-rim-fragments.png">Download</a><button class="remove-card" type="button" aria-label="Remove Rim Fragments">Remove</button></div><figcaption>10. Rim Fragments</figcaption></figure></div></main>
<dialog class="image-viewer" id="imageViewer">
  <div class="image-viewer-inner">
    <button class="viewer-close" type="button">Close</button>
    <img id="viewerImage" alt="">
  </div>
</dialog>
<script>
(function () {
  var key = "creative-production-review:" + location.pathname;
  var stored = {};
  try { stored = JSON.parse(localStorage.getItem(key) || "{}"); } catch (error) { stored = {}; }
  var selected = new Set(stored.selected || []);
  var hidden = new Set(stored.hidden || []);
  function persist() {
    localStorage.setItem(key, JSON.stringify({ selected: Array.from(selected), hidden: Array.from(hidden) }));
  }
  document.querySelectorAll("figure[data-card-id]").forEach(function (card) {
    var id = card.getAttribute("data-card-id");
    if (selected.has(id)) card.classList.add("selected");
    if (hidden.has(id)) card.classList.add("hidden");
    var select = card.querySelector(".select-card");
    if (select) {
      select.setAttribute("aria-pressed", selected.has(id) ? "true" : "false");
      select.textContent = selected.has(id) ? "Selected" : "Select";
      select.addEventListener("click", function () {
        if (selected.has(id)) selected.delete(id);
        else selected.add(id);
        card.classList.toggle("selected", selected.has(id));
        select.setAttribute("aria-pressed", selected.has(id) ? "true" : "false");
        select.textContent = selected.has(id) ? "Selected" : "Select";
        persist();
      });
    }
    var remove = card.querySelector(".remove-card");
    if (remove) {
      remove.addEventListener("click", function () {
        hidden.add(id);
        card.classList.add("hidden");
        persist();
      });
    }
  });
  var viewer = document.getElementById("imageViewer");
  var viewerImage = document.getElementById("viewerImage");
  if (viewer && viewerImage) {
    document.querySelectorAll(".image-link").forEach(function (link) {
      link.addEventListener("click", function (event) {
        event.preventDefault();
        viewerImage.src = link.getAttribute("href");
        if (typeof viewer.showModal === "function") viewer.showModal();
        else location.href = link.getAttribute("href");
      });
    });
    viewer.querySelector(".viewer-close").addEventListener("click", function () { viewer.close(); });
    viewer.addEventListener("click", function (event) { if (event.target === viewer) viewer.close(); });
  }
}());
</script>
</body>
</html>

name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm test
      - name: Registry output is committed and fresh
        run: git diff --exit-code -- public/r registry.json
      - name: Registry manifest validates
        run: npx shadcn@latest registry validate ./registry.json
